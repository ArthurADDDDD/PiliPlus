name: Build

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:
            build_android:
                description: "Build Android"
                required: false
                default: true
                type: boolean

            build_ios:
                description: "Build iOS"
                required: false
                default: false
                type: boolean

            build_mac:
                description: "Build Mac"
                required: false
                default: false
                type: boolean

            build_win_x64:
                description: "Build Win-x64"
                required: false
                default: false
                type: boolean

            build_linux_x64:
                description: "Build Linux-x64"
                required: false
                default: false
                type: boolean

            tag:
                description: "正式发布 tag（如 v2.0.9+5103）。留空 = 仅测试构建，不创建 Release，不会被 App 更新检查发现。"
                required: false
                default: ""
                type: string

jobs:
    android:
        # PR：本仓库的 PR 都可以跑 Android 编译验证（不再限定上游仓库）。
        # workflow_dispatch：tag 留空 = 测试构建（仅 Actions artifact）；
        #                    tag 非空 = 正式签名 Release（见下方 preflight）。
        if: ${{ github.event_name == 'pull_request' || github.event.inputs.build_android == 'true' }}
        name: Build Android
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            # 只有 workflow_dispatch 且 tag 非空时才是"正式发布"。PR 事件下
            # 这个值恒为 'false'，因此下面所有读取 release secrets / 创建
            # Release 的步骤在 PR 场景下结构性地不可达，不需要额外判断。
            IS_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && 'true' || 'false' }}

        steps:
            - name: 代码迁出
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: 构建Java环境
              uses: actions/setup-java@v5
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"
                  cache-dependency-path: |
                      android/*.gradle*
                      android/**/gradle-wrapper.properties

            - name: 安装Flutter
              uses: subosito/flutter-action@v2
              id: flutter-action
              with:
                  channel: stable
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Apply Patch
              shell: pwsh
              run: lib/scripts/patch.ps1 android

            # ---------------------------------------------------------------
            # 正式发布 preflight：任何一项失败都必须让 workflow 失败，
            # 不得静默回退到测试签名，也不得继续创建 Release。
            # ---------------------------------------------------------------

            - name: "[Release] Preflight: 校验必须在 workflow_dispatch 且非 PR"
              if: ${{ env.IS_RELEASE == 'true' }}
              run: |
                  if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
                    echo "::error::formal release must run via workflow_dispatch"
                    exit 1
                  fi

            - name: "[Release] Preflight: 校验签名 secrets 齐全"
              if: ${{ env.IS_RELEASE == 'true' }}
              run: |
                  missing=()
                  [ -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ] && missing+=("SIGN_KEYSTORE_BASE64")
                  [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing+=("KEYSTORE_PASSWORD")
                  [ -z "${{ secrets.KEY_ALIAS }}" ] && missing+=("KEY_ALIAS")
                  [ -z "${{ secrets.KEY_PASSWORD }}" ] && missing+=("KEY_PASSWORD")
                  if [ ${#missing[@]} -ne 0 ]; then
                    echo "::error::missing required release signing secrets: ${missing[*]}. A formal release must fail closed instead of falling back to debug signing. See docs/RELEASE_GUIDE.md."
                    exit 1
                  fi

            - name: "[Release] Preflight: tag 必须与 pubspec.yaml 版本一致"
              if: ${{ env.IS_RELEASE == 'true' }}
              shell: pwsh
              env:
                  RELEASE_TAG: ${{ github.event.inputs.tag }}
              run: lib/scripts/release_version.ps1 -Tag $env:RELEASE_TAG

            - name: "[Release] Preflight: tag 不得已存在（禁止覆盖已发布正式版本）"
              if: ${{ env.IS_RELEASE == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_TAG: ${{ github.event.inputs.tag }}
              run: |
                  if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                    echo "::error::release $RELEASE_TAG already exists. Refusing to overwrite an existing formal release; delete it manually first if this was truly intentional."
                    exit 1
                  fi

            - name: "[Release] Preflight: 校验签名证书指纹 Variable 已配置且合法"
              # 证书指纹本身不是秘密（公开信息），用 Repository Variable
              # 而非 Secret；这里只校验格式，实际比对在写入 keystore 之后
              # 和 APK 构建之后各做一次（见下方两处 fingerprint 校验步骤）。
              if: ${{ env.IS_RELEASE == 'true' }}
              shell: pwsh
              env:
                  EXPECTED_CERT_INPUT: ${{ vars.EXPECTED_SIGNING_CERT_SHA256 }}
              run: |
                  . lib/scripts/signing_fingerprint.ps1
                  $normalized = ConvertTo-NormalizedFingerprint $env:EXPECTED_CERT_INPUT
                  if ($null -eq $normalized) {
                    Write-Error "EXPECTED_SIGNING_CERT_SHA256 repository Variable is missing, empty, or not a valid 64-hex-char SHA-256 fingerprint. Configure it (Settings -> Secrets and variables -> Actions -> Variables; see docs/RELEASE_GUIDE.md) before running a formal release. This check exists to stop a mistakenly-swapped keystore from producing a Release that can't override-install over existing users' devices."
                    exit 1
                  }
                  Add-Content -Path $env:GITHUB_ENV -Value "expectedCertSha256=$normalized"
                  Write-Host "Expected signing certificate SHA-256: $normalized"

            - name: "[Test build] Set and Extract version"
              if: ${{ env.IS_RELEASE != 'true' && github.event_name == 'workflow_dispatch' }}
              shell: pwsh
              run: lib/scripts/build.ps1 android

            # ---------------------------------------------------------------
            # 签名：正式发布用固定 release keystore；PR/测试构建永远不接触
            # release secrets（IS_RELEASE 在这些场景下恒为 false，见上）。
            # ---------------------------------------------------------------

            - name: "[Release] 写入正式签名 keystore"
              if: ${{ env.IS_RELEASE == 'true' }}
              run: |
                  echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
                  echo storeFile='key.jks' >> android/key.properties
                  echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
                  echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
                  echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> android/key.properties

            - name: "[Release] Preflight: 校验 keystore 证书指纹与预期一致"
              # 在构建前就发现"传错了 keystore/alias"，而不是构建完一个
              # 无法覆盖安装的 APK 之后才发现。不得输出密码/Base64。
              if: ${{ env.IS_RELEASE == 'true' }}
              shell: pwsh
              env:
                  KEYSTORE_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
              run: |
                  . lib/scripts/signing_fingerprint.ps1
                  try {
                    $actual = Get-KeystoreCertFingerprint -KeystorePath "android/app/key.jks" -Alias $env:KEYSTORE_ALIAS -StorePassword $env:KEYSTORE_PASS
                  } catch {
                    Write-Error "Could not read the signing certificate from the keystore/alias: $($_.Exception.Message)"
                    exit 1
                  }
                  $normalizedActual = ConvertTo-NormalizedFingerprint $actual
                  if ($null -eq $normalizedActual) {
                    Write-Error "keytool returned a fingerprint that could not be normalized to a 64-hex-char SHA-256 digest."
                    exit 1
                  }
                  Add-Content -Path $env:GITHUB_ENV -Value "keystoreCertSha256=$normalizedActual"
                  if (-not (Test-FingerprintMatch -Expected $env:expectedCertSha256 -Actual $actual)) {
                    Write-Error "Signing certificate mismatch.`nExpected: $env:expectedCertSha256`nActual:   $normalizedActual`nFormal release aborted to prevent an APK that cannot upgrade existing installations."
                    exit 1
                  }
                  Write-Host "Keystore certificate fingerprint matches EXPECTED_SIGNING_CERT_SHA256: $normalizedActual"

            # 本 fork 只维护 Pixel（arm64-v8a），--split-per-abi 搭配单一
            # --target-platform android-arm64 只会产出一个
            # app-arm64-v8a-release.apk，不再产出 armeabi-v7a/x86_64/
            # universal APK。
            - name: Flutter Build - 正式 Release Apk
              if: ${{ env.IS_RELEASE == 'true' }}
              run: flutter build apk --release --split-per-abi --target-platform android-arm64 --dart-define-from-file=pili_release.json --pub

            - name: Flutter Build - workflow_dispatch 测试 Apk（tag 留空）
              if: ${{ env.IS_RELEASE != 'true' && github.event_name == 'workflow_dispatch' }}
              run: flutter build apk --release --split-per-abi --target-platform android-arm64 --android-project-arg dev=1 --dart-define-from-file=pili_release.json --pub

            - name: Flutter Build - PR 编译验证 Apk
              if: ${{ github.event_name == 'pull_request' }}
              run: flutter build apk --release --split-per-abi --target-platform android-arm64 --android-project-arg dev=1 --pub

            - name: Rename
              run: |
                  prefix="PiliPlus_android"
                  if [ "${{ env.IS_RELEASE }}" != "true" ]; then
                    prefix="PiliPlus_android_dev"
                  fi
                  for file in build/app/outputs/flutter-apk/app-*-release.apk; do
                    abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
                    mv "$file" "${prefix}_${{ env.version }}_${abi}.apk"
                  done
              shell: bash

            - name: "校验只生成了一个 arm64-v8a APK"
              # 本 fork 只支持 Pixel（arm64-v8a）。如果因为 Flutter/Gradle
              # 配置漂移又生成了 armeabi-v7a、x86_64 或 universal APK，这里
              # 必须让 workflow 显式失败，而不是把多余的产物悄悄传上去。
              shell: bash
              run: |
                  shopt -s nullglob
                  apks=(PiliPlus_android_*.apk)
                  if [ ${#apks[@]} -eq 0 ]; then
                    echo "::error::no APK found after the Rename step"
                    exit 1
                  fi
                  bad=()
                  arm64_count=0
                  for f in "${apks[@]}"; do
                    case "$f" in
                      *arm64-v8a*) arm64_count=$((arm64_count + 1)) ;;
                      *) bad+=("$f") ;;
                    esac
                  done
                  if [ ${#bad[@]} -ne 0 ]; then
                    echo "::error::unexpected non-arm64-v8a APK(s) produced: ${bad[*]}. This fork only builds arm64-v8a for Pixel; check that --target-platform android-arm64 is still passed to every 'flutter build apk' step."
                    exit 1
                  fi
                  if [ "$arm64_count" -ne 1 ]; then
                    echo "::error::expected exactly 1 arm64-v8a APK, found $arm64_count: ${apks[*]}"
                    exit 1
                  fi
                  echo "OK: exactly one arm64-v8a APK: ${apks[0]}"

            - name: "[Release] 校验 APK 签名与证书指纹（apksigner）"
              # 双重校验：apksigner 本身验证签名有效性 + 每个 APK 的证书
              # SHA-256 与 EXPECTED_SIGNING_CERT_SHA256 一致（防止 Gradle
              # 实际用错了 signingConfig，即便前面 keystore 本身校验通过）。
              if: ${{ env.IS_RELEASE == 'true' }}
              shell: pwsh
              run: |
                  . lib/scripts/signing_fingerprint.ps1

                  $buildToolsRoot = Join-Path $env:ANDROID_HOME 'build-tools'
                  $latest = Get-ChildItem -Path $buildToolsRoot -Directory |
                      Sort-Object -Property @{ Expression = {
                          try { [version]($_.Name -replace '[^\d\.].*$', '') } catch { [version]'0.0.0' }
                      } } -Descending |
                      Select-Object -First 1
                  if ($null -eq $latest) {
                    Write-Error "no Android build-tools directory found under $buildToolsRoot"
                    exit 1
                  }
                  $apksigner = Join-Path $latest.FullName 'apksigner'

                  $failed = $false
                  $lastCert = $null
                  Get-ChildItem -Path . -Filter 'PiliPlus_android_*.apk' | ForEach-Object {
                    $apkName = $_.Name
                    Write-Host "== $apkName =="
                    try {
                      $cert = Get-ApkCertFingerprint -ApksignerPath $apksigner -ApkPath $_.FullName
                    } catch {
                      Write-Error "apksigner verification failed for ${apkName}: $($_.Exception.Message)"
                      $script:failed = $true
                      return
                    }
                    $normalizedCert = ConvertTo-NormalizedFingerprint $cert
                    Write-Host "  certificate SHA-256: $normalizedCert"
                    if (-not (Test-FingerprintMatch -Expected $env:expectedCertSha256 -Actual $cert)) {
                      Write-Error "Signing certificate mismatch for ${apkName}.`nExpected: $env:expectedCertSha256`nActual:   $normalizedCert`nFormal release aborted to prevent an APK that cannot upgrade existing installations."
                      $script:failed = $true
                    }
                    $script:lastCert = $normalizedCert
                  }

                  if ($null -ne $lastCert) {
                    Add-Content -Path $env:GITHUB_ENV -Value "apkCertSha256=$lastCert"
                  }
                  if ($failed) {
                    exit 1
                  }

            - name: Generate checksums
              run: sha256sum PiliPlus_android_*.apk | tee SHA256SUMS.txt

            - name: Job summary
              if: always()
              env:
                  RELEASE_TAG: ${{ github.event.inputs.tag }}
              run: |
                  {
                    echo "### Android build summary"
                    echo ""
                    echo "| field | value |"
                    echo "|---|---|"
                    echo "| commit | \`${{ github.sha }}\` |"
                    echo "| branch/ref | \`${{ github.ref_name }}\` |"
                    echo "| applicationId | \`$( [ "${{ env.IS_RELEASE }}" = "true" ] && echo "com.example.piliplus" || echo "com.example.piliplus.dev" )\` |"
                    echo "| versionName | \`${{ env.versionName }}\` |"
                    echo "| versionCode | \`${{ env.versionCode }}\` |"
                    echo "| release tag input | \`$RELEASE_TAG\` |"
                    echo "| signing | \`$( [ "${{ env.IS_RELEASE }}" = "true" ] && echo "release keystore" || echo "dev/debug" )\` |"
                    echo "| formal release created | \`${{ env.IS_RELEASE }}\` |"
                    if [ "${{ env.IS_RELEASE }}" = "true" ]; then
                      match="unknown"
                      if [ -n "${{ env.expectedCertSha256 }}" ] && [ "${{ env.expectedCertSha256 }}" = "${{ env.keystoreCertSha256 }}" ] && [ "${{ env.expectedCertSha256 }}" = "${{ env.apkCertSha256 }}" ]; then
                        match="true"
                      elif [ -n "${{ env.expectedCertSha256 }}" ]; then
                        match="false"
                      fi
                      echo "| expected signing cert SHA-256 | \`${{ env.expectedCertSha256 }}\` |"
                      echo "| keystore cert SHA-256 | \`${{ env.keystoreCertSha256 }}\` |"
                      echo "| final APK cert SHA-256 | \`${{ env.apkCertSha256 }}\` |"
                      echo "| all three match | \`$match\` |"
                    fi
                    echo ""
                    echo "| APK | size (bytes) | SHA-256 |"
                    echo "|---|---:|---|"
                    for apk in PiliPlus_android_*.apk; do
                      [ -f "$apk" ] || continue
                      size=$(stat -c%s "$apk")
                      sha=$(sha256sum "$apk" | cut -d' ' -f1)
                      echo "| \`$apk\` | $size | \`$sha\` |"
                    done
                  } >> "$GITHUB_STEP_SUMMARY"
              # 不输出 keystore Base64、密码或证书私钥内容，只输出上表这些
              # 非敏感字段。

            - name: "[Release] 创建 GitHub Release"
              if: ${{ env.IS_RELEASE == 'true' }}
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.inputs.tag }}
                  name: ${{ github.event.inputs.tag }}
                  target_commitish: ${{ github.sha }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false
                  fail_on_unmatched_files: true
                  files: |
                      PiliPlus_android_${{ env.version }}_arm64-v8a.apk
                      SHA256SUMS.txt

            - name: "[Test build] 上传 Actions artifact（非正式发布，不会被 App 更新检查发现）"
              # archive: false 要求 path 精确指向单个文件，不能用通配符匹配
              # 多个文件；现在每次构建只产出一个 arm64-v8a APK，文件名可以
              # 精确拼出，用户下载后直接拿到 APK，不用先解压 zip。
              if: ${{ env.IS_RELEASE != 'true' }}
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android-test-build
                  path: PiliPlus_android_dev_${{ env.version }}_arm64-v8a.apk

    ios:
        # 本次改动范围限定在 Android（见 4.1）；ios/win_x64 的 PR 触发条件
        # 保持原样未动，避免影响未验证的其他平台构建。
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_ios == 'true' }}
        uses: ./.github/workflows/ios.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    mac:
        if: ${{ github.event.inputs.build_mac == 'true' }}
        uses: ./.github/workflows/mac.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    win_x64:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_win_x64 == 'true' }}
        uses: ./.github/workflows/win_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    linux_x64:
        if: ${{ github.event.inputs.build_linux_x64 == 'true' }}
        uses: ./.github/workflows/linux_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
